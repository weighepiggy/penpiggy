<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>老年机页面</title>

<!-- 关键：让 Opera Mini 正确识别宽度 -->
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style type="text/css">
  * {
    margin:0; padding:0;
  }
  body {
    font-family: sans-serif;
    font-size: 16px; /* 老机建议16~18px */
    line-height: 1.4;
    padding: 4px;
  }
  /* 只写最基础CSS，老浏览器全支持 */
  .box {
    margin: 6px 0;
    padding: 6px;
  }
  a {
    color: #0066cc;
  }
</style>

</head>
<body>

<div class="box">
  <h2>欢迎访问</h2>
  <p>这是适配老年机 Opera Mini 的页面</p>
  <p><a href="http://你的网址">点我跳转</a></p>
</div>

</body>
</html>
